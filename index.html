<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SADDROP1220 // ROOT_ACCESS</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body class="off">
    <canvas id="matrix"></canvas>
    <div class="scanline"></div>

    <div id="boot-screen" class="terminal">
        <div id="boot-logs"></div>
    </div>

    <div id="access-screen" class="terminal" style="display: none;">
        <p class="directory">C:\USERS\SADDROP1220> run portfolio.exe</p>
        <p class="warning">CAUTION: ACCESSING RESTRICTED DATA.</p>
        <p>Are you sure? (y/n): <span id="user-input"></span><span class="blink">_</span></p>
    </div>

    <div id="main-content" class="terminal" style="display: none;">
        <header>
            <h1>SYSTEM ACCESS GRANTED</h1>
            <hr>
        </header>
        <section class="content">
            <div class="block">
                <h2>> КТО Я?</h2>
                <p>Разработчик, исследователь кода, создатель цифровых миров.</p>
            </div>
            <div class="block">
                <h2>> СТЕК</h2>
                <p>[ Python ] [ JavaScript ] [ HTML/CSS ] [ Linux ]</p>
            </div>
            <p class="blink">_ Система активна...</p>
        </section>
    </div>

    <script>
        const bootLogs = document.getElementById('boot-logs');
        const bootScreen = document.getElementById('boot-screen');
        const accessScreen = document.getElementById('access-screen');
        const mainContent = document.getElementById('main-content');
        const userInputSpan = document.getElementById('user-input');

        const logs = [
            "[  OK  ] Started Initializing system units.",
            "[  OK  ] Reached target Local File Systems.",
            "[  OK  ] Found device /dev/ttyS0.",
            "[  OK  ] Mounting Network Storage...",
            "[  OK  ] Connection established: 192.168.1.122",
            "[ WAIT ] Loading encrypted modules...",
            "[  OK  ] Decryption complete.",
            "[  OK  ] Started Portfolio Security Layer.",
            "Starting login sequence..."
        ];

        let logIndex = 0;
        function showLogs() {
            if (logIndex < logs.length) {
                const p = document.createElement('p');
                p.style.margin = "2px 0";
                p.innerHTML = logs[logIndex].replace("[  OK  ]", "<span style='color:#00ff41'>[  OK  ]</span>");
                bootLogs.appendChild(p);
                logIndex++;
                setTimeout(showLogs, Math.random() * 300 + 50);
            } else {
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    accessScreen.style.display = 'block';
                }, 800);
            }
        }
        window.onload = showLogs;

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (accessScreen.style.display === 'block') {
                if (key === 'y') {
                    userInputSpan.innerText = 'y';
                    setTimeout(() => {
                        accessScreen.style.display = 'none';
                        mainContent.style.display = 'block';
                        startMatrix();
                    }, 500);
                } else if (key === 'n') {
                    userInputSpan.innerText = 'n';
                    document.body.classList.add('tv-off');
                    setTimeout(() => { window.location.href = "about:blank"; }, 800);
                }
            }
        });

        function startMatrix() {
            const canvas = document.getElementById('matrix');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const letters = "日ハミヒーヘホマミムメモヤユヨ0123456789ABCDEF";
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0f0";
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = letters.charAt(Math.floor(Math.random() * letters.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }
    </script>
</body>
</html>
